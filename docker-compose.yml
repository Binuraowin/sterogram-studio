version: "3.9"

services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - ./backend/generated_images:/app/generated_images
    environment:
      - DATABASE_URL=sqlite:///./stereogram_studio.db
      - HF_TOKEN=${HF_TOKEN}
      - HF_MODEL=${HF_MODEL:-black-forest-labs/FLUX.1-schnell}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_BUCKET=${SUPABASE_BUCKET:-stereograms}
      - WP_URL=${WP_URL}
      - WP_USER=${WP_USER}
      - WP_APP_PASSWORD=${WP_APP_PASSWORD}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
